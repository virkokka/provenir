name: CI

on:
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ---------------------------------------------------------------------------
  # Rust / WASM
  # ---------------------------------------------------------------------------
  rust:
    name: Cargo test + wasm-pack build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry + build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Run unit tests (native target)
        run: cargo test --workspace

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build WASM package
        working-directory: crates/provenir-core
        run: wasm-pack build --target web --out-dir ../../extension/src/wasm

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: provenir-wasm
          path: extension/src/wasm/

  # ---------------------------------------------------------------------------
  # Extension
  # ---------------------------------------------------------------------------
  extension:
    name: Extension build (wxt)
    runs-on: ubuntu-latest
    needs: rust   # wxt build needs the WASM files in extension/src/wasm/

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: extension/package-lock.json

      - name: Download WASM artifact
        uses: actions/download-artifact@v4
        with:
          name: provenir-wasm
          path: extension/src/wasm/

      - name: Install dependencies
        working-directory: extension
        run: npm ci

      - name: Type check
        working-directory: extension
        run: npm run typecheck

      - name: Build extension (Chrome MV3)
        working-directory: extension
        run: npm run build

      - name: Build extension (Firefox MV3)
        working-directory: extension
        run: npm run build:firefox

  # ---------------------------------------------------------------------------
  # Worker
  # ---------------------------------------------------------------------------
  worker:
    name: Worker type check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: worker/package-lock.json

      - name: Install dependencies
        working-directory: worker
        run: npm ci

      - name: Type check
        working-directory: worker
        run: npm run typecheck
